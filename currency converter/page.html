<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Currency Converter</h1>
        <form>
        <div class="amount">
        <p>Enter amount</p>
        <input value="100" type="text"></input>
        </div>
        <div class="dropdown">
        <div class="from">
            <p>from</p>
            <select class="select_container">
                <option>INR</option>
                <option selected>USD</option>
                <option>AUD</option>
                <option>EUR</option>
            </select>
        </div>
        <div class="to">
            <p>TO</p>
            <select class="select_container">
                <option selected>INR</option>
                <option>USD</option>
                <option>AUD</option>
                <option>EUR</option>
            </select>
        </div>
        </div>
        <div class="msg">
            1 USD = 80 INR
        </div>
        <button>Get Exchange Rate</button>
        </form>
    </div>
    <script src="codes.js"></script>
    <script src="app.js"></script>
</body>
</html>
